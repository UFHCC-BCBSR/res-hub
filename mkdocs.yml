  - Grant Writing:
    - Bioinformatics Plan: grant-writing/bioinfo-plan.md
    - DMSP: grant-writing/DMSP.md
    - Key Personnel: grant-writing/key-personnel.md
    - Publication Figures: grant-writing/publication-figures.md
  - Publishing:
    - Authorship: publishing/authorship.md
    - Code Availability: publishing/code-availability.md
    - Data Availability: publishing/data-availability.md
    - Publication Figures: publishing/publication-figures.md
  - Blog:
    - Bioinformatics Blogs: blog/bioinfo-blogs.md
    - Journal Club: blog/journal-club.md
    - Discussion Questions: blog/discussion-questions.md

